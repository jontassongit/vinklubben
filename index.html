<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinklubbens Register</title>
    <!-- Tailwind CSS för styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React och Babel för att köra JSX direkt i webbläsaren -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF9F6;
        }
        ::-webkit-scrollbar-thumb {
            background: #E8E2D9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D1C7BD;
        }
    </style>
</head>
<body class="bg-[#FDFCF8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /**
         * Ikon-komponent för att hantera Lucide i CDN-miljö.
         * Använder ett stabilt span-element som behållare för att undvika 
         * att React försöker ta bort noder som Lucide har manipulerat.
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    // Vi skapar en specifik ikon inuti vår referens
                    window.lucide.createIcons({
                        attrs: {
                            class: className,
                            style: `width: ${size}px; height: ${size}px;`
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);

            // Vi använder key={name} för att tvinga React att ersätta elementet 
            // helt om ikonen ändras, vilket minskar risken för krockar.
            return (
                <span 
                    key={name} 
                    ref={containerRef} 
                    className="inline-flex items-center justify-center leading-none"
                    style={{ minWidth: size, minHeight: size }}
                >
                    <i data-lucide={name}></i>
                </span>
            );
        };

        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQv4HdPZVBMfNFSKu0g-9Zv1SneO8Msws73-fq1olVXjpFa2-9p5NXapBGMuSrLPgJ_mIf26pNkSbWT/pub?gid=0&single=true&output=csv";

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedGrapes, setSelectedGrapes] = useState([]);
            const [showGrapeDropdown, setShowGrapeDropdown] = useState(false);
            const [headers, setHeaders] = useState([]);
            const dropdownRef = useRef(null);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [visibleGroups, setVisibleGroups] = useState({
                totalGrades: false,
                marcus: false,
                saeunn: false,
                kajsa: false,
                john: false,
                kristoffer: false,
                jonas: false
            });

            const parseCSV = (csvText) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let insideQuotes = false;
                for (let i = 0; i < csvText.length; i++) {
                    const char = csvText[i];
                    const nextChar = csvText[i + 1];
                    if (char === '"') {
                        if (insideQuotes && nextChar === '"') { currentField += '"'; i++; }
                        else { insideQuotes = !insideQuotes; }
                    } else if (char === ',' && !insideQuotes) {
                        currentRow.push(currentField.trim());
                        currentField = '';
                    } else if ((char === '\r' || char === '\n') && !insideQuotes) {
                        if (currentField || currentRow.length > 0) {
                            currentRow.push(currentField.trim());
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else { currentField += char; }
                }
                if (currentField || currentRow.length > 0) {
                    currentRow.push(currentField.trim());
                    rows.push(currentRow);
                }
                if (rows.length === 0) return [];
                const rawHeaders = rows[0];
                setHeaders(rawHeaders);
                return rows.slice(1).map(row => {
                    const obj = {};
                    rawHeaders.forEach((header, index) => { obj[header] = row[index] || ''; });
                    return obj;
                });
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    const csvText = await response.text();
                    setData(parseCSV(csvText));
                } catch (err) {
                    console.error("Fel vid hämtning:", err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const handleClickOutside = (e) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowGrapeDropdown(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const getCleanImageUrl = (value) => {
                if (!value || typeof value !== 'string') return null;
                let url = value.trim().replace(/^["']|["']$/g, '');
                const formulaMatch = url.match(/=IMAGE\("(.*?)"\)/i);
                if (formulaMatch) url = formulaMatch[1];
                if (!url.startsWith('http')) return null;
                return url;
            };

            const allGrapes = useMemo(() => {
                const grapesSet = new Set();
                data.forEach(row => {
                    const ravaror = row["Råvaror"] || "";
                    if (ravaror) {
                        ravaror.split(/, | och /).forEach(part => {
                            const cleaned = part.replace(/[0-9]+%?\s*/g, '').trim();
                            if (cleaned && cleaned.length > 2) {
                                grapesSet.add(cleaned.charAt(0).toUpperCase() + cleaned.slice(1));
                            }
                        });
                    }
                });
                return Array.from(grapesSet).sort();
            }, [data]);

            const columnGroups = {
                totalGrades: ["Betyg totalt", "Betyg utan mat", "Betyg med mat"],
                marcus: ["Marcus", "Marcus mat"],
                saeunn: ["Sæunn", "Sæunn mat"],
                kajsa: ["Kajsa", "Kajsa mat"],
                john: ["John", "John mat"],
                kristoffer: ["Kristoffer", "Kristoffer mat"],
                jonas: ["Jonas", "Jonas mat"]
            };

            const displayHeaders = useMemo(() => {
                return headers.filter(h => {
                    const name = h.trim();
                    const upperName = name.toUpperCase();
                    const hiddenFields = ["BILDLÄNK", "AE", "URL", "IMAGE", "BILDER", "BILD", "BOLAGSLÄNK"];
                    if (hiddenFields.includes(upperName) || name === "") return false;
                    if (data.length > 0 && getCleanImageUrl(data[0][name])) return false;
                    for (const [groupKey, colList] of Object.entries(columnGroups)) {
                        if (colList.includes(name)) return visibleGroups[groupKey];
                    }
                    return true;
                });
            }, [headers, data, visibleGroups]);

            const sortedData = useMemo(() => {
                let sortableData = [...data];
                if (sortConfig.key !== null) {
                    sortableData.sort((a, b) => {
                        const valA = a[sortConfig.key] || '';
                        const valB = b[sortConfig.key] || '';
                        const numA = parseFloat(valA.replace(',', '.'));
                        const numB = parseFloat(valB.replace(',', '.'));
                        if (!isNaN(numA) && !isNaN(numB)) return sortConfig.direction === 'asc' ? numA - numB : numB - numA;
                        return sortConfig.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    });
                }
                return sortableData;
            }, [data, sortConfig]);

            const filteredData = useMemo(() => {
                let result = sortedData;
                if (searchTerm) {
                    const lowerSearch = searchTerm.toLowerCase();
                    result = result.filter(row => Object.values(row).some(val => val.toString().toLowerCase().includes(lowerSearch)));
                }
                if (selectedGrapes.length > 0) {
                    result = result.filter(row => {
                        const ravaror = (row["Råvaror"] || "").toLowerCase();
                        return selectedGrapes.some(grape => ravaror.includes(grape.toLowerCase()));
                    });
                }
                return result;
            }, [sortedData, searchTerm, selectedGrapes]);

            const getSortStyle = (sort) => {
                const val = (sort || "").toLowerCase();
                if (val.includes("rött")) return "text-[#722F37] bg-[#722F37]/5 px-2 py-0.5 rounded";
                if (val.includes("vitt")) return "text-[#8B7D3B] bg-[#8B7D3B]/5 px-2 py-0.5 rounded"; 
                if (val.includes("mousserat")) return "text-[#A6894A] bg-[#A6894A]/5 px-2 py-0.5 rounded";
                if (val.includes("orange")) return "text-[#B35D38] bg-[#B35D38]/5 px-2 py-0.5 rounded";
                if (val.includes("rosé") || val.includes("rose")) return "text-[#D65D7A] bg-[#D65D7A]/5 px-2 py-0.5 rounded";
                return "";
            };

            return (
                <div className="min-h-screen font-serif">
                    <header className="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-[#E8E2D9] shadow-sm">
                        <div className="max-w-[1800px] mx-auto px-6 py-4">
                            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                                <div className="flex items-center gap-4">
                                    <div className="bg-[#722F37] p-3 rounded-full shadow-lg shrink-0 flex items-center justify-center">
                                        <Icon name="wine" className="text-[#FDFCF8]" />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-semibold text-[#4A3737] tracking-tight">Vinklubbens Register</h1>
                                        <p className="text-xs text-[#8C7A7A] font-medium uppercase mt-1 tracking-widest italic font-sans">
                                            {filteredData.length} Viner visas
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="flex flex-wrap items-center gap-3 font-sans">
                                    <div className="relative flex-1 min-w-[240px]" ref={dropdownRef}>
                                        <button onClick={() => setShowGrapeDropdown(!showGrapeDropdown)} className="w-full pl-10 pr-4 py-2.5 text-left text-sm border border-[#E8E2D9] rounded-xl bg-[#FAF9F6] text-[#4A3737] flex items-center justify-between">
                                            <Icon name="filter" size={16} className="text-[#A69696]" />
                                            <span className="flex-1 ml-2 truncate">{selectedGrapes.length === 0 ? "Alla druvor" : `${selectedGrapes.length} druvor`}</span>
                                            <Icon name="chevron-down" size={14} className={showGrapeDropdown ? 'rotate-180 transition-transform' : 'transition-transform'} />
                                        </button>
                                        {showGrapeDropdown && (
                                            <div className="absolute top-full left-0 w-full mt-2 bg-white border border-[#E8E2D9] rounded-xl shadow-2xl z-[50] max-h-80 overflow-y-auto p-2">
                                                {allGrapes.map(grape => (
                                                    <div key={grape} onClick={() => setSelectedGrapes(prev => prev.includes(grape) ? prev.filter(g => g !== grape) : [...prev, grape])} className={`flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-sm ${selectedGrapes.includes(grape) ? 'bg-[#722F37]/10 text-[#722F37] font-semibold' : 'hover:bg-[#FAF9F6]'}`}>
                                                        {grape} {selectedGrapes.includes(grape) && <Icon name="check" size={14} />}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="relative flex-1 min-w-[280px]">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center">
                                            <Icon name="search" size={18} className="text-[#A69696]" />
                                        </div>
                                        <input type="text" placeholder="Sök..." className="w-full pl-10 pr-4 py-2.5 text-sm border border-[#E8E2D9] rounded-xl bg-[#FAF9F6]" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                    <button onClick={fetchData} className="p-2.5 bg-white border border-[#E8E2D9] text-[#722F37] rounded-xl active:scale-95 flex items-center justify-center">
                                        <Icon name="refresh-cw" className={loading ? 'animate-spin' : ''} />
                                    </button>
                                </div>
                            </div>

                            <div className="mt-6 pt-4 border-t border-[#F0EBE3] flex flex-wrap items-center gap-x-8 gap-y-4 font-sans">
                                <div className="flex items-center gap-3">
                                    <span className="text-[11px] font-bold text-[#A69696] uppercase tracking-widest">Visa:</span>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" className="hidden" checked={visibleGroups.totalGrades} onChange={() => setVisibleGroups(v => ({...v, totalGrades: !v.totalGrades}))} />
                                        <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${visibleGroups.totalGrades ? 'bg-[#722F37] border-[#722F37]' : 'border-[#E8E2D9]'}`}>
                                            {visibleGroups.totalGrades && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                        </div>
                                        <span className="text-sm font-medium">Gemensamt</span>
                                    </label>
                                </div>
                                <div className="flex flex-wrap items-center gap-2">
                                    {['marcus', 'saeunn', 'kajsa', 'john', 'kristoffer', 'jonas'].map(person => (
                                        <button key={person} onClick={() => setVisibleGroups(v => ({...v, [person]: !v[person]}))} className={`px-3 py-1 rounded-full text-xs font-semibold border transition-all ${visibleGroups[person] ? 'bg-[#722F37] text-white border-[#722F37]' : 'bg-white border-[#E8E2D9] text-[#8C7A7A]'}`}>
                                            {person === 'saeunn' ? 'Sæunn' : person.charAt(0).toUpperCase() + person.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1800px] mx-auto p-6 lg:p-10">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-40">
                                <div className="w-12 h-12 border-4 border-[#E8E2D9] border-t-[#722F37] rounded-full animate-spin mb-6"></div>
                                <p className="text-[#8C7A7A] italic font-sans">Laddar viner...</p>
                            </div>
                        ) : (
                            <div className="bg-white border border-[#E8E2D9] rounded-3xl shadow-xl overflow-hidden">
                                <div className="overflow-x-auto max-h-[calc(100vh-280px)] overflow-y-auto">
                                    <table className="w-full text-left border-collapse font-sans">
                                        <thead className="sticky top-0 z-10 bg-[#FAF9F6] border-b border-[#E8E2D9]">
                                            <tr>
                                                <th className="px-8 py-5 text-[11px] font-bold text-[#A69696] uppercase tracking-widest">Etikett</th>
                                                {displayHeaders.map((header, i) => (
                                                    <th key={i} onClick={() => setSortConfig({ key: header, direction: sortConfig.key === header && sortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="px-8 py-5 text-[11px] font-bold text-[#A69696] uppercase tracking-widest cursor-pointer hover:text-[#722F37] whitespace-nowrap">
                                                        {header}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-[#F0EBE3]">
                                            {filteredData.map((row, rowIndex) => {
                                                const imgUrl = getCleanImageUrl(row["Bildlänk"] || row["AE"] || row["Bilder"] || row["Bild"]);
                                                return (
                                                    <tr key={rowIndex} className="hover:bg-[#FDFCF8] transition-colors group">
                                                        <td className="px-8 py-6">
                                                            <div className="relative w-24 h-24 rounded-xl bg-white border border-[#E8E2D9] flex items-center justify-center overflow-visible p-1">
                                                                {imgUrl ? (
                                                                    <img src={imgUrl} className="max-w-full max-h-full object-contain cursor-zoom-in hover:scale-[3.0] transition-transform hover:z-50 hover:absolute bg-white p-2 rounded shadow-lg" />
                                                                ) : <Icon name="wine" size={24} className="opacity-20" />}
                                                            </div>
                                                        </td>
                                                        {displayHeaders.map((header, colIndex) => {
                                                            const val = row[header];
                                                            const isGrade = header.toLowerCase().includes('betyg') || header.toLowerCase().includes('mat');
                                                            
                                                            if (header.trim() === "#" && val) {
                                                                const code = val.trim().endsWith('01') ? val.trim() : `${val.trim()}01`;
                                                                return (
                                                                    <td key={colIndex} className="px-8 py-6">
                                                                        <a href={`https://www.systembolaget.se/produkt/vin/${code}/`} target="_blank" className="inline-flex items-center gap-1 px-3 py-1.5 bg-[#F5F2ED] text-[#722F37] font-bold text-xs rounded-lg border border-[#E8E2D9]">
                                                                            {val} <Icon name="external-link" size={12} />
                                                                        </a>
                                                                    </td>
                                                                );
                                                            }

                                                            return (
                                                                <td key={colIndex} className="px-8 py-6">
                                                                    {isGrade ? (
                                                                        <span className="font-bold text-[#722F37] text-xl">{val || '-'}</span>
                                                                    ) : (
                                                                        <div className={`text-sm font-medium ${header === 'Sort' ? getSortStyle(val) : ''}`}>
                                                                            {val || <span className="text-gray-200">—</span>}
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
