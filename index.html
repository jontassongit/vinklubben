<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinklubbens Register</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FDFCF8] m-0 p-0 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Ikoner ---
    const IconBase = ({ size = 24, className = "", children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Wine = (props) => <IconBase {...props}><path d="M8 22h8"/><path d="M7 10h10"/><path d="M12 15v7"/><path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H9c-1.5 4-2 6-2 8a5 5 0 0 0 5 5Z"/></IconBase>;
    const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
    const Filter = (props) => <IconBase {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconBase>;
    const ChevronDown = (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>;
    const ChevronUp = (props) => <IconBase {...props}><path d="m18 15-6-6-6 6"/></IconBase>;
    const Check = (props) => <IconBase {...props}><path d="M20 6 9 17l-5-5"/></IconBase>;
    const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
    const User = (props) => <IconBase {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
    const ExternalLink = (props) => <IconBase {...props}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></IconBase>;

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQv4HdPZVBMfNFSKu0g-9Zv1SneO8Msws73-fq1olVXjpFa2-9p5NXapBGMuSrLPgJ_mIf26pNkSbWT/pub?gid=0&single=true&output=csv";

    const App = () => {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedGrapes, setSelectedGrapes] = useState([]);
      const [showGrapeDropdown, setShowGrapeDropdown] = useState(false);
      const [headers, setHeaders] = useState([]);
      const dropdownRef = useRef(null);
      
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

      const [visibleGroups, setVisibleGroups] = useState({
        totalGrades: false,
        marcus: false,
        saeunn: false,
        kajsa: false,
        john: false,
        kristoffer: false,
        jonas: false
      });

      const parseCSV = (csvText) => {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let insideQuotes = false;

        for (let i = 0; i < csvText.length; i++) {
          const char = csvText[i];
          const nextChar = csvText[i + 1];

          if (char === '"') {
            if (insideQuotes && nextChar === '"') {
              currentField += '"';
              i++;
            } else {
              insideQuotes = !insideQuotes;
            }
          } else if (char === ',' && !insideQuotes) {
            currentRow.push(currentField.trim());
            currentField = '';
          } else if ((char === '\r' || char === '\n') && !insideQuotes) {
            if (currentField || currentRow.length > 0) {
              currentRow.push(currentField.trim());
              rows.push(currentRow);
            }
            currentRow = [];
            currentField = '';
            if (char === '\r' && nextChar === '\n') i++;
          } else {
            currentField += char;
          }
        }
        
        if (currentField || currentRow.length > 0) {
          currentRow.push(currentField.trim());
          rows.push(currentRow);
        }

        if (rows.length === 0) return [];
        const rawHeaders = rows[0];
        setHeaders(rawHeaders);

        return rows.slice(1).map(row => {
          const obj = {};
          rawHeaders.forEach((header, index) => {
            obj[header] = row[index] || '';
          });
          return obj;
        });
      };

      const fetchData = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch(SHEET_CSV_URL);
          if (!response.ok) throw new Error("Kunde inte hämta data.");
          const csvText = await response.text();
          const parsedData = parseCSV(csvText);
          setData(parsedData);
        } catch (err) {
          setError("Kunde inte hämta data från Google Sheets.");
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
        const handleClickOutside = (event) => {
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setShowGrapeDropdown(false);
          }
        };
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const getCleanImageUrl = (value) => {
        if (!value || typeof value !== 'string') return null;
        let url = value.trim().replace(/^["']|["']$/g, '');
        const formulaMatch = url.match(/=IMAGE\("(.*?)"\)/i);
        if (formulaMatch) url = formulaMatch[1];
        if (!url.startsWith('http')) return null;

        const isKnownImageHost = /gstatic\.com|googleusercontent\.com|drive\.google\.com|images\.unsplash\.com|cloudinary\.com|imgix\.net/i.test(url);
        const hasImageExtension = /\.(jpeg|jpg|gif|png|webp|svg|avif)/i.test(url);
        const looksLikeThumbnail = url.includes('tbn:') || url.includes('images?q=');

        return (isKnownImageHost || hasImageExtension || looksLikeThumbnail) ? url : null;
      };

      const allGrapes = useMemo(() => {
        const grapesSet = new Set();
        data.forEach(row => {
          const ravaror = row["Råvaror"] || "";
          if (ravaror) {
            const parts = ravaror.split(/, | och /);
            parts.forEach(part => {
              const cleaned = part.replace(/[0-9]+%?\s*/g, '').trim();
              if (cleaned && cleaned.length > 2) {
                const formatted = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
                grapesSet.add(formatted);
              }
            });
          }
        });
        return Array.from(grapesSet).sort();
      }, [data]);

      const columnGroups = {
        totalGrades: ["Betyg totalt", "Betyg utan mat", "Betyg med mat"],
        marcus: ["Marcus", "Marcus mat"],
        saeunn: ["Sæunn", "Sæunn mat"],
        kajsa: ["Kajsa", "Kajsa mat"],
        john: ["John", "John mat"],
        kristoffer: ["Kristoffer", "Kristoffer mat"],
        jonas: ["Jonas", "Jonas mat"]
      };

      const displayHeaders = useMemo(() => {
        return headers.filter(h => {
          const name = h.trim();
          const upperName = name.toUpperCase();
          
          const hiddenFields = ["BILDLÄNK", "AE", "URL", "IMAGE", "BILDER", "BILD", "BOLAGSLÄNK"];
          if (hiddenFields.includes(upperName) || name === "") return false;
          
          if (data.length > 0 && getCleanImageUrl(data[0][name])) return false;
          
          for (const [groupKey, colList] of Object.entries(columnGroups)) {
            if (colList.includes(name)) return visibleGroups[groupKey];
          }
          return true;
        });
      }, [headers, data, visibleGroups]);

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const sortedData = useMemo(() => {
        let sortableData = [...data];
        if (sortConfig.key !== null) {
          sortableData.sort((a, b) => {
            const valA = a[sortConfig.key] || '';
            const valB = b[sortConfig.key] || '';
            const numA = parseFloat(valA.replace(',', '.'));
            const numB = parseFloat(valB.replace(',', '.'));
            if (!isNaN(numA) && !isNaN(numB)) return sortConfig.direction === 'asc' ? numA - numB : numB - numA;
            if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
            if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return sortableData;
      }, [data, sortConfig]);

      const filteredData = useMemo(() => {
        let result = sortedData;
        
        if (searchTerm) {
          const lowerSearch = searchTerm.toLowerCase();
          result = result.filter(row => 
            Object.values(row).some(val => val.toString().toLowerCase().includes(lowerSearch))
          );
        }

        if (selectedGrapes.length > 0) {
          result = result.filter(row => {
            const ravaror = (row["Råvaror"] || "").toLowerCase();
            return selectedGrapes.some(grape => ravaror.includes(grape.toLowerCase()));
          });
        }

        return result;
      }, [sortedData, searchTerm, selectedGrapes]);

      const toggleGrape = (grape) => {
        setSelectedGrapes(prev => 
          prev.includes(grape) ? prev.filter(g => g !== grape) : [...prev, grape]
        );
      };

      const toggleGroup = (group) => {
        setVisibleGroups(prev => ({ ...prev, [group]: !prev[group] }));
      };

      const getSortStyle = (sort) => {
        const val = (sort || "").toLowerCase();
        if (val.includes("rött")) return "text-[#722F37] bg-[#722F37]/5 px-2 py-0.5 rounded";
        if (val.includes("vitt")) return "text-[#8B7D3B] bg-[#8B7D3B]/5 px-2 py-0.5 rounded"; 
        if (val.includes("mousserat")) return "text-[#A6894A] bg-[#A6894A]/5 px-2 py-0.5 rounded";
        if (val.includes("orange")) return "text-[#B35D38] bg-[#B35D38]/5 px-2 py-0.5 rounded";
        if (val.includes("rosé") || val.includes("rose")) return "text-[#D65D7A] bg-[#D65D7A]/5 px-2 py-0.5 rounded";
        return "";
      };

      return (
        <div className="h-screen h-[100dvh] bg-[#FDFCF8] text-[#2D2424] font-serif flex flex-col overflow-hidden">
          {/* HEADER SEKTION */}
          <header className="shrink-0 z-30 bg-white/90 backdrop-blur-md border-b border-[#E8E2D9] shadow-sm">
            <div className="max-w-[1800px] mx-auto px-4 md:px-6 py-3 md:py-4">
              <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-3 md:gap-6">
                
                {/* Titel & Ikon */}
                <div className="flex items-center gap-3 md:gap-4">
                  <div className="bg-[#722F37] p-2 md:p-3 rounded-full shadow-lg shrink-0">
                    <Wine className="text-[#FDFCF8] w-5 h-5 md:w-6 md:h-6" />
                  </div>
                  <div>
                    <h1 className="text-xl md:text-2xl font-semibold text-[#4A3737] tracking-tight">Vinklubbens Register</h1>
                    <p className="text-[10px] md:text-xs text-[#8C7A7A] font-medium uppercase mt-0.5 md:mt-1 tracking-widest italic">
                      {filteredData.length} Viner visas • {sortConfig.key ? `Sorterat efter ${sortConfig.key}` : 'Standardordning'}
                    </p>
                  </div>
                </div>
                
                {/* Sök & Filter dropdown (Mobil-anpassad flex-riktning) */}
                <div className="flex flex-col sm:flex-row w-full lg:w-auto gap-2 md:gap-3 mt-1 lg:mt-0">
                  <div className="relative w-full sm:w-1/2 lg:w-auto lg:min-w-[240px]" ref={dropdownRef}>
                    <button 
                      onClick={() => setShowGrapeDropdown(!showGrapeDropdown)}
                      className="w-full pl-9 md:pl-10 pr-4 py-2 md:py-2.5 text-left text-xs md:text-sm border border-[#E8E2D9] rounded-lg md:rounded-xl bg-[#FAF9F6] text-[#4A3737] hover:border-[#722F37]/30 transition-all flex items-center justify-between"
                    >
                      <Filter className="absolute left-3 top-1/2 -translate-y-1/2 text-[#A69696] w-4 h-4" />
                      <span className="truncate mr-2">
                        {selectedGrapes.length === 0 ? "Alla druvor" : `${selectedGrapes.length} druvor valda`}
                      </span>
                      <ChevronDown className={`w-4 h-4 transition-transform ${showGrapeDropdown ? 'rotate-180' : ''}`} />
                    </button>
                    
                    {showGrapeDropdown && (
                      <div className="absolute top-full left-0 w-full mt-2 bg-white border border-[#E8E2D9] rounded-xl shadow-2xl z-[50] max-h-64 md:max-h-80 overflow-y-auto p-2">
                        {selectedGrapes.length > 0 && (
                          <button 
                            onClick={() => setSelectedGrapes([])}
                            className="w-full text-left px-3 py-2 mb-2 text-[10px] md:text-xs font-bold text-[#722F37] hover:bg-[#722F37]/5 rounded-lg flex items-center justify-between"
                          >
                            Rensa filter <X className="w-3 h-3 md:w-4 md:h-4" />
                          </button>
                        )}
                        {allGrapes.map(grape => (
                          <div 
                            key={grape}
                            onClick={() => toggleGrape(grape)}
                            className={`flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer text-xs md:text-sm transition-colors ${selectedGrapes.includes(grape) ? 'bg-[#722F37]/10 text-[#722F37] font-semibold' : 'hover:bg-[#FAF9F6]'}`}
                          >
                            {grape}
                            {selectedGrapes.includes(grape) && <Check className="w-3 h-3 md:w-4 md:h-4" />}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="relative w-full sm:w-1/2 lg:w-auto lg:min-w-[280px]">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-[#A69696] w-4 h-4" />
                    <input 
                      type="text"
                      placeholder="Sök producent, namn, årgång..."
                      className="w-full pl-9 md:pl-10 pr-4 py-2 md:py-2.5 text-xs md:text-sm border border-[#E8E2D9] rounded-lg md:rounded-xl focus:outline-none focus:ring-2 focus:ring-[#722F37]/10 transition-all bg-[#FAF9F6] placeholder-[#A69696]"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                </div>
              </div>

              {/* Toggles (Gemensamt & Medlemmar) */}
              <div className="mt-3 md:mt-5 pt-3 md:pt-4 border-t border-[#F0EBE3] flex flex-wrap items-center gap-x-4 md:gap-x-8 gap-y-2 md:gap-y-4">
                 <div className="flex items-center gap-2 md:gap-3">
                    <span className="text-[9px] md:text-[11px] font-bold text-[#A69696] uppercase tracking-widest">Visa Betyg:</span>
                    <label className="flex items-center gap-1.5 md:gap-2 cursor-pointer group">
                      <div className={`w-4 h-4 md:w-5 md:h-5 rounded flex items-center justify-center border-2 transition-all ${visibleGroups.totalGrades ? 'bg-[#722F37] border-[#722F37]' : 'border-[#E8E2D9] bg-white'}`}>
                        <input 
                          type="checkbox" 
                          className="hidden"
                          checked={visibleGroups.totalGrades}
                          onChange={() => toggleGroup('totalGrades')}
                        />
                        {visibleGroups.totalGrades && <div className="w-1.5 h-1.5 md:w-2 md:h-2 bg-white rounded-full"></div>}
                      </div>
                      <span className="text-xs md:text-sm font-medium text-[#4A3737] group-hover:text-[#722F37] transition-colors">Gemensamt</span>
                    </label>
                 </div>
                 
                 <div className="h-4 md:h-5 w-[1px] bg-[#E8E2D9] hidden md:block"></div>

                 <div className="flex flex-wrap items-center gap-2 md:gap-3">
                    <span className="text-[9px] md:text-[11px] font-bold text-[#A69696] uppercase tracking-widest w-full sm:w-auto">Medlemmar:</span>
                    {Object.keys(columnGroups).filter(k => k !== 'totalGrades').map(person => (
                      <button
                        key={person}
                        onClick={() => toggleGroup(person)}
                        className={`px-3 py-1 md:px-4 md:py-1.5 rounded-full text-[10px] md:text-xs font-semibold transition-all border ${
                          visibleGroups[person] 
                            ? 'bg-[#722F37] border-[#722F37] text-white shadow-md' 
                            : 'bg-white border-[#E8E2D9] text-[#8C7A7A] hover:border-[#722F37]/30 hover:text-[#722F37]'
                        }`}
                      >
                        <span className="flex items-center gap-1.5 md:gap-2 capitalize">
                          <User className="w-3 h-3 md:w-[13px] md:h-[13px]" />
                          {person === 'saeunn' ? 'Sæunn' : person}
                        </span>
                      </button>
                    ))}
                 </div>
              </div>
            </div>
          </header>

          {/* TABELL SEKTION (Fyller ut resterande utrymme) */}
          <main className="flex-1 w-full max-w-[1800px] mx-auto p-2 md:p-6 lg:p-10 overflow-hidden flex flex-col">
            {loading ? (
              <div className="flex flex-col items-center justify-center h-full">
                <div className="w-10 h-10 md:w-12 md:h-12 border-4 border-[#E8E2D9] border-t-[#722F37] rounded-full animate-spin mb-4 md:mb-6"></div>
                <p className="text-xs md:text-sm text-[#8C7A7A] font-medium tracking-wide italic">Hämtar källarlistan...</p>
              </div>
            ) : (
              <div className="bg-white border border-[#E8E2D9] rounded-xl md:rounded-3xl shadow-xl flex-1 flex flex-col overflow-hidden relative">
                {/* overflow-auto ser till att skrollningen bara sker i tabellen, inte hela sidan */}
                <div className="flex-1 overflow-auto">
                  <table className="w-full text-left border-collapse table-auto">
                    
                    {/* Sticky Table Header */}
                    <thead className="sticky top-0 z-20 bg-[#FAF9F6] border-b border-[#E8E2D9] shadow-sm">
                      <tr>
                        <th className="px-4 py-3 md:px-8 md:py-5 text-[9px] md:text-[11px] font-bold text-[#A69696] uppercase tracking-[0.2em] min-w-[80px] md:min-w-[140px]">Etikett</th>
                        {displayHeaders.map((header, i) => (
                          <th 
                            key={i} 
                            onClick={() => requestSort(header)}
                            className="px-4 py-3 md:px-8 md:py-5 text-[9px] md:text-[11px] font-bold text-[#A69696] uppercase tracking-[0.2em] whitespace-nowrap cursor-pointer hover:text-[#722F37] transition-colors group/h"
                          >
                            <div className="flex items-center gap-1 md:gap-2">
                              {header}
                              <div className="flex flex-col opacity-0 group-hover/h:opacity-100 transition-opacity">
                                <ChevronUp className={`w-3 h-3 ${sortConfig.key === header && sortConfig.direction === 'asc' ? 'text-[#722F37]' : 'text-[#D1C7BD]'}`} />
                                <ChevronDown className={`w-3 h-3 ${sortConfig.key === header && sortConfig.direction === 'desc' ? 'text-[#722F37]' : 'text-[#D1C7BD]'}`} />
                              </div>
                            </div>
                          </th>
                        ))}
                      </tr>
                    </thead>
                    
                    <tbody className="divide-y divide-[#F0EBE3]">
                      {filteredData.length > 0 ? (
                        filteredData.map((row, rowIndex) => {
                          let finalImageUrl = null;
                          const priorityFields = ["Bildlänk", "AE", "Bilder", "Bild"];
                          for (const field of priorityFields) {
                            const url = getCleanImageUrl(row[field]);
                            if (url) { finalImageUrl = url; break; }
                          }
                          if (!finalImageUrl) {
                            for (const val of Object.values(row)) {
                              const url = getCleanImageUrl(val);
                              if (url) { finalImageUrl = url; break; }
                            }
                          }

                          return (
                            <tr key={rowIndex} className="hover:bg-[#FDFCF8] transition-colors group relative hover:z-10">
                              
                              {/* Bildkolumn */}
                              <td className="px-4 py-3 md:px-8 md:py-6">
                                <div className="relative w-14 h-14 md:w-24 md:h-24 rounded-lg md:rounded-xl bg-white border border-[#E8E2D9] flex items-center justify-center shadow-inner overflow-visible p-1">
                                  {finalImageUrl ? (
                                    <img 
                                      src={finalImageUrl} 
                                      alt="Flaska" 
                                      className="max-w-full max-h-full object-contain transition-all duration-300 ease-in-out cursor-zoom-in hover:scale-[2.5] md:hover:scale-[3.0] hover:z-[100] hover:shadow-[0_20px_50px_rgba(0,0,0,0.15)] hover:fixed sm:hover:absolute bg-white p-1 md:p-2 rounded-lg" 
                                      loading="lazy" 
                                    />
                                  ) : (
                                    <div className="flex flex-col items-center gap-1 md:gap-2 opacity-20">
                                      <Wine className="w-5 h-5 md:w-6 md:h-6 text-[#A69696]" />
                                      <span className="text-[6px] md:text-[8px] font-bold uppercase tracking-tighter">Saknas</span>
                                    </div>
                                  )}
                                </div>
                              </td>

                              {/* Övrig Data */}
                              {displayHeaders.map((header, colIndex) => {
                                const rawVal = row[header];
                                const headerLower = header.toLowerCase();
                                const trimHeader = header.trim();
                                
                                // Systembolaget-länk formatering
                                if (trimHeader === "#" && rawVal && !isNaN(parseInt(rawVal))) {
                                  const productCode = rawVal.trim();
                                  const finalCode = productCode.endsWith('01') ? productCode : `${productCode}01`;
                                  const sbLink = `https://www.systembolaget.se/produkt/vin/${finalCode}/`;
                                  
                                  return (
                                    <td key={colIndex} className="px-4 py-3 md:px-8 md:py-6">
                                      <a 
                                        href={sbLink} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="inline-flex items-center gap-1.5 md:gap-2 px-3 py-1.5 md:px-4 md:py-2 bg-[#F5F2ED] text-[#722F37] font-bold text-[10px] md:text-xs rounded-md md:rounded-lg hover:bg-[#722F37] hover:text-white transition-all group/link shadow-sm border border-[#E8E2D9]"
                                      >
                                        {rawVal}
                                        <ExternalLink className="w-3 h-3 md:w-[14px] md:h-[14px] opacity-40 group-hover/link:opacity-100" />
                                      </a>
                                    </td>
                                  );
                                }

                                const isGradeColumn = headerLower.includes('betyg') || 
                                                      headerLower.includes('mat') || 
                                                      Object.keys(columnGroups).some(k => k !== 'totalGrades' && header.includes(k.charAt(0).toUpperCase() + k.slice(1)));

                                const isEmpty = !rawVal || rawVal.trim() === "" || rawVal.trim() === "0" || rawVal.trim() === "-";
                                
                                // Betygskolumn formatering
                                if (isGradeColumn) {
                                  return (
                                    <td key={colIndex} className="px-4 py-3 md:px-8 md:py-6">
                                      {isEmpty ? (
                                        <span className="text-[8px] md:text-[10px] italic text-[#D1C7BD] font-medium uppercase tracking-widest whitespace-nowrap">Ej betygsatt</span>
                                      ) : (
                                        <div className="flex items-baseline gap-0.5">
                                          <span className="font-bold text-[#722F37] text-lg md:text-xl">{rawVal}</span>
                                        </div>
                                      )}
                                    </td>
                                  );
                                }

                                // Standard Text-kolumn formatering
                                return (
                                  <td key={colIndex} className="px-4 py-3 md:px-8 md:py-6 text-[#4A3737]">
                                    <div className={`min-w-[110px] md:min-w-[150px] leading-relaxed text-xs md:text-sm font-medium ${trimHeader === "Sort" ? getSortStyle(rawVal) : ""}`}>
                                      {rawVal || <span className="text-[#F0EBE3]">—</span>}
                                    </div>
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })
                      ) : (
                        <tr>
                          <td colSpan={displayHeaders.length + 1} className="px-4 py-20 md:py-40 text-center text-xs md:text-sm text-[#A69696] italic tracking-wide">
                            Inga viner matchade dina valda filter.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
